<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 0; font-family: Arial, sans-serif; }
    #loading { color: #555; font-size: 1rem; margin-top: 60px; }
    #error { color: #c0392b; font-size: 1rem; margin-top: 60px; text-align: center; padding: 20px; line-height: 1.6; }
    #docFrame { width: 100%; max-width: 780px; border: none; background: #fff; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="loading">Loading your document...</div>
  <div id="error" style="display:none"></div>
  <iframe id="docFrame" style="display:none" title="Document"></iframe>
  <script>
    var SUPABASE_URL    = 'https://dwiqqtutsjainpvdizgt.supabase.co';
    var BUCKET          = 'Documents';

    var params   = new URLSearchParams(window.location.search);
    var path     = params.get('path');   // short form: userId/filename.html
    var fullUrl  = params.get('url');    // legacy long form (fallback)

    var storageUrl = fullUrl || (path
      ? SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + path
      : null);

    if (!storageUrl) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').textContent = 'No document specified.';
      document.getElementById('error').style.display = '';
    } else {
      fetch(storageUrl)
        .then(function(r) {
          if (!r.ok) throw new Error('Could not load document (status ' + r.status + ')');
          return r.text();
        })
        .then(function(html) {
          document.getElementById('loading').style.display = 'none';
          var frame = document.getElementById('docFrame');
          frame.style.display = '';
          frame.onload = function() {
            try {
              var h = frame.contentDocument.documentElement.scrollHeight;
              frame.style.height = (h + 20) + 'px';
            } catch(e) {}
          };
          var blob = new Blob([html], { type: 'text/html' });
          frame.src = URL.createObjectURL(blob);
        })
        .catch(function(e) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').innerHTML =
            'Sorry, we could not load this document.<br><br>' +
            '<small style="color:#999">' + (e.message || '') + '</small>';
          document.getElementById('error').style.display = '';
        });
    }
  </script>
</body>
</html>
